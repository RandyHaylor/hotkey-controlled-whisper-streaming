name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  linux:
    name: Linux (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
    env:
      CUDA_VISIBLE_DEVICES: ""
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-hf-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg espeak

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v

  windows:
    name: Windows (windows-latest)
    runs-on: windows-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
    env:
      CUDA_VISIBLE_DEVICES: ""
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~\.cache\huggingface
          key: ${{ runner.os }}-hf-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-hf-

      - name: Install ffmpeg (chocolatey)
        run: choco install -y ffmpeg
        shell: pwsh

      - name: Install AutoHotkey v2 (chocolatey, pinned)
        run: choco install -y autohotkey --version=2.0.11
        shell: pwsh

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        shell: pwsh

      - name: Run pytest
        run: pytest tests/ -v
        shell: pwsh

      - name: Validate AutoHotkey script syntax
        shell: pwsh
        run: |
          $candidates = @(
            "C:\Program Files\AutoHotkey\v2\AutoHotkey64.exe",
            "C:\Program Files\AutoHotkey\v2\AutoHotkey32.exe",
            "C:\Program Files\AutoHotkey\AutoHotkey64.exe",
            "C:\ProgramData\chocolatey\lib\autohotkey\tools\AutoHotkey64.exe"
          )
          $ahk = $null
          foreach ($c in $candidates) {
            if (Test-Path $c) { $ahk = $c; break }
          }
          if (-not $ahk) {
            $found = Get-ChildItem -Path "C:\Program Files\AutoHotkey","C:\ProgramData\chocolatey\lib\autohotkey" -Recurse -Filter "AutoHotkey*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $ahk = $found.FullName }
          }
          if (-not $ahk) {
            Write-Error "AutoHotkey executable not found"
            exit 1
          }
          Write-Host "Using AutoHotkey at: $ahk"
          & $ahk /validate windows\streaming_dictation.ahk
          if ($LASTEXITCODE -ne 0) {
            Write-Error "AutoHotkey script validation failed (exit $LASTEXITCODE)"
            exit $LASTEXITCODE
          }
